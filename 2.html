<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 - Kurdor</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&family=Poppins:wght@600&display=swap" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'Rabar';
            src: url('https://github.com/1kurdor/1kurdor.github.io/blob/f42cf188e95dfce027e23fc247b6c97334739eb1/assets/fonts/Rabar.ttf?raw=true') format('truetype');
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100%;
            /* Your original background */
            background: linear-gradient(135deg, #ff0202c8 0%, #36ab13a7 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* HACKER OVERLAY: Scanlines and Grid */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 1;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        #wordCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 0; 
            pointer-events: none; 
        }

        .profile-container {
            text-align: center;
            z-index: 2;
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #000;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .profile-pic:hover {
            transform: scale(1.05) rotate(2deg);
            box-shadow: 0 0 35px rgba(255, 213, 0, 0.3);
        }

        .bio-section {
            margin-top: 20px;
            text-align: center;
            z-index: 2;
            width: 90%;
            max-width: 450px;
        }

        .name {
            font-family: 'Poppins', sans-serif;
            font-size: 38px;
            font-weight: 700;
            background: linear-gradient(to right, #EE332E, #FFD500, #007A3D);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        /* IMPROVED SUMMARY BOX */
        .summary-box {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 4px solid #FFD500;
            border-radius: 12px;
            padding: 0; /* Let details handle padding */
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            transition: transform 0.3s ease;
        }

        .summary-box:hover {
            transform: translateY(-5px);
            border-left-color: #007A3D;
        }

        details {
            padding: 15px 20px;
            cursor: pointer;
        }

        summary {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            color: #fff;
            list-style: none;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        summary::before {
            content: "▶";
            font-size: 12px;
            margin-right: 10px;
            transition: transform 0.2s;
            color: #FFD500;
        }

        details[open] summary::before {
            transform: rotate(90deg);
        }

        .role {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin: 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .flag-icon {
            font-size: 20px;
            filter: drop-shadow(0 0 5px #FFD500);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 30%, rgba(0,0,0,0.6) 100%);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>
    <canvas id="wordCanvas"></canvas>

    <div class="profile-container">
        <img src="https://archive.org/download/music_20260127/me.png" alt="Profile" class="profile-pic">
    </div>  

    <div class="bio-section">
        <h1 class="name">Kurdor 404</h1>

        <div class="summary-box">
            <details>
                <summary>Long Live Kurdistan</summary>
                <div style="padding-bottom: 10px;">
                    <p class="role">No Matter How Tall</p>
                    <p class="role">The Mountain Is,</p>
                    <p class="role">The Sun Always Rise.. <span class="flag-icon">☀️</span></p>
                </div>
            </details>
        </div>
    </div>

    <script>
        // ... (Keep your existing wordCanvas script here, it works great!)
        const canvas = document.getElementById('wordCanvas');
        const ctx = canvas.getContext('2d');
        let words = [];
        const wordList = ["Kurdor", "Hacked By Kurdor", "Rashid Farhad", "Hacked By Rashid Farhad", "404 Not Found", "🟥☀️🟩"];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            words = [];
            for (let i = 0; i < 60; i++) {
                words.push({
                    text: wordList[Math.floor(Math.random() * wordList.length)],
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    fontSize: Math.random() * 7 + 14,
                    speed: Math.random() * 0.20 + 0.05,
                    opacity: Math.random() * 0.20 + 0.03 
                });
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            words.forEach(word => {
                ctx.font = `500 ${word.fontSize}px 'Rabar', sans-serif`;
                ctx.fillStyle = `rgba(0, 0, 0, ${word.opacity})`;
                ctx.fillText(word.text, word.x, word.y);
                word.y -= word.speed;
                if (word.y < -50) {
                    word.y = canvas.height + 50;
                    word.x = Math.random() * canvas.width;
                }
            });
            requestAnimationFrame(draw);
        }

        document.fonts.ready.then(() => {
            init();
            draw();
        });

        window.addEventListener('resize', init);
    </script>
</body>
</html>
