<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>سیخوڕ | imposter</title>
    <style>
        /* Rabar Font - Local Path */
        @font-face {
            font-family: 'Rabar';
            src: url('assets/fonts/Rabar.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        
        @font-face {
            font-family: 'Rabar';
            src: url('assets/fonts/Rabar-bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
            font-display: swap;
        }
        
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
  /* ===== PREVENT TEXT SELECTION ON EVERYTHING ===== */
    * {
        -webkit-user-select: none; /* Safari */
        -moz-user-select: none;    /* Firefox */
        -ms-user-select: none;     /* Internet Explorer/Edge */
        user-select: none;         /* Non-prefixed version */
    }
    
    /* Allow text selection ONLY in input fields */
    input, textarea {
        -webkit-user-select: text;  /* Safari */
        -moz-user-select: text;     /* Firefox */
        -ms-user-select: text;      /* Internet Explorer/Edge */
        user-select: text;          /* Non-prefixed version */
    }
        
        body {
            font-family: 'Rabar', 'Arial Unicode MS', 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #e6f0ff 0%, #f0f7ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            direction: rtl;
            padding: 12px;
            position: relative;
        }
        
        /* Main Container */
        .game-container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 36px;
            padding: 24px 20px 20px 20px;
            box-shadow: 
                0 15px 30px rgba(0, 100, 255, 0.1),
                0 5px 15px rgba(255, 200, 0, 0.1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.2);
            margin-bottom: 10px;
        }
        
        /* Background Gradients */
        .game-container::before {
            content: "";
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.1), transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }
        
        .game-container::after {
            content: "";
            position: absolute;
            bottom: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1), transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }
        
        /* Content */
        .content {
            position: relative;
            z-index: 2;
        }
        
        /* Headers */
        h1 {
            font-size: 2.2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
        }
        
        h2 {
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 18px;
            color: #0066cc;
            position: relative;
            padding-bottom: 8px;
            font-weight: 500;
        }
        
        h2::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, #0066cc, #ffcc00);
            border-radius: 2px;
        }
        
        /* Kurdor Link - moved to footer now */
        
        /* Buttons */
        .btn {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 10px 0;
            font-family: 'Rabar', 'Arial Unicode MS', 'Segoe UI', sans-serif;
            box-shadow: 0 4px 10px rgba(0, 102, 204, 0.1);
        }
        
        /* Blue Button - Imposter Game */
        .btn-blue {
            background: linear-gradient(135deg, #0066cc, #0099ff);
            color: white;
            box-shadow: 0 4px 0 #003366;
        }
        
        .btn-blue:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #003366;
        }
        
        /* Red Button - Different Word Game */
        .btn-red {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
            box-shadow: 0 4px 0 #990000;
        }
        
        .btn-red:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #990000;
        }
        
        /* Yellow Button - Main Page */
        .btn-yellow {
            background: linear-gradient(135deg, #ffcc00, #ffaa00);
            color: #1a2a3a;
            box-shadow: 0 4px 0 #996600;
        }
        
        .btn-yellow:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #996600;
        }
        
        .btn-secondary {
            background: white;
            color: #0066cc;
            border: 1px solid #ffcc00;
        }
        
        /* Player Counter */
        .counter-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            background: white;
            padding: 12px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0, 102, 204, 0.05);
            border: 1px solid rgba(255, 204, 0, 0.2);
        }
        
        .counter-btn {
            width: 45px;
            height: 45px;
            border-radius: 25px;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            border: none;
            font-size: 1.8rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 102, 204, 0.2);
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .counter-btn:active {
            transform: scale(0.95);
        }
        
        .counter-value {
            font-size: 2.5rem;
            font-weight: 500;
            color: #0066cc;
            min-width: 60px;
            text-align: center;
        }
        
        /* Player Inputs */
        .player-input {
            width: 100%;
            padding: 14px 18px;
            margin: 8px 0;
            border: 1px solid rgba(0, 102, 204, 0.2);
            border-radius: 40px;
            background: white;
            font-size: 1rem;
            text-align: right;
            direction: rtl;
            font-family: 'Rabar', 'Arial Unicode MS', 'Segoe UI', sans-serif;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
        }
        
        .player-input:focus {
            outline: none;
            border-color: #ffcc00;
            box-shadow: 0 0 0 3px rgba(255, 204, 0, 0.1);
        }
        
        .player-input::placeholder {
            color: #99b8d9;
            font-size: 0.95rem;
        }
        
        /* Cards - BEFORE REVEAL (all white) */
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px 20px;
            margin: 18px 0;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: gentleFade 0.4s ease;
            border: 2px solid #0066cc;
            box-shadow: 0 15px 30px rgba(0, 102, 204, 0.1);
        }
        
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0, 102, 204, 0.2);
        }
        
        .card:active {
            transform: scale(0.98);
        }
        
        @keyframes gentleFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .player-name {
            font-size: 2rem;
            color: #0066cc;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .tap-message {
            font-size: 1.1rem;
            color: #666;
            margin: 25px 0;
            background: #f5f9ff;
            padding: 12px 20px;
            border-radius: 40px;
            display: inline-block;
            border: 1px solid rgba(255, 204, 0, 0.2);
        }
        
        .role-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            animation: gentleBounce 0.4s ease;
        }
        
        @keyframes gentleBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* AFTER REVEAL - Colored cards for imposter game */
        .card-spy-revealed {
            background: linear-gradient(145deg, #ff4444, #cc0000);
            color: white;
            border: 2px solid #ffcc00;
            box-shadow: 0 15px 30px rgba(255, 0, 0, 0.3);
            cursor: default;
            padding: 40px 20px;
            border-radius: 32px;
            text-align: center;
        }
        
        .card-civilian-revealed {
            background: linear-gradient(145deg, #00cc66, #00994d);
            color: white;
            border: 2px solid #ffcc00;
            box-shadow: 0 15px 30px rgba(0, 204, 0, 0.3);
            cursor: default;
            padding: 40px 20px;
            border-radius: 32px;
            text-align: center;
        }
        
        .card-spy-revealed .player-name,
        .card-civilian-revealed .player-name {
            color: white;
        }
        
        .card-spy-revealed .tap-message,
        .card-civilian-revealed .tap-message {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        .word-display {
            font-size: 3rem;
            font-weight: bold;
            padding: 20px 30px;
            border-radius: 40px;
            display: inline-block;
            margin: 15px 0;
        }
        
        .card-spy-revealed .word-display,
        .card-civilian-revealed .word-display {
            background: rgba(0, 0, 0, 0.2);
            color: white;
        }
        
        /* White card after reveal (for different word game) */
        .card-white-revealed {
            background: white;
            color: #333;
            border: 2px solid #0066cc;
            box-shadow: 0 15px 30px rgba(0, 102, 204, 0.1);
            cursor: default;
            padding: 40px 20px;
            border-radius: 32px;
            text-align: center;
        }
        
        .card-white-revealed .word-display {
            background: #f0f7ff;
            color: #0066cc;
            border: 2px solid #ffcc00;
        }
        
        /* Progress Bar */
        .progress {
            background: white;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            margin: 18px 0;
            font-size: 1rem;
            color: #0066cc;
            font-weight: 500;
            border: 1px solid rgba(255, 204, 0, 0.2);
            box-shadow: 0 2px 5px rgba(0, 102, 204, 0.05);
        }
        
        /* Reveal Button - for both games */
        .reveal-btn {
            background: linear-gradient(135deg, #ffcc00, #ffaa00);
            color: #1a2a3a;
            font-size: 1.3rem;
            padding: 18px;
            border-radius: 40px;
            border: none;
            width: 100%;
            margin: 20px 0;
            cursor: pointer;
            box-shadow: 0 4px 0 #996600;
            transition: all 0.3s ease;
            font-family: 'Rabar', 'Arial Unicode MS', 'Segoe UI', sans-serif;
            font-weight: bold;
        }
        
        .reveal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #996600;
        }
        
        /* Reveal Page Cards */
        .reveal-card {
            background: linear-gradient(145deg, #1a1a1a, #333333);
            border: 3px solid #ffcc00;
            border-radius: 32px;
            padding: 30px 20px;
            text-align: center;
            animation: gentleReveal 0.5s ease;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            margin: 20px 0;
        }
        
        @keyframes gentleReveal {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .reveal-card .role-icon {
            font-size: 5rem;
        }
        
        .person-name {
            font-size: 2.2rem;
            margin: 15px 0;
            font-weight: 500;
            color: #ffcc00;
        }
        
        /* Results Container */
        .results-container {
            background: #f8fbff;
            border-radius: 32px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(255, 204, 0, 0.2);
        }
        
        .player-result {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            margin: 6px 0;
            background: white;
            border-radius: 30px;
            font-size: 1.1rem;
            border: 1px solid rgba(0, 102, 204, 0.1);
        }
        
        .spy-badge {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 1rem;
        }
        
        .civilian-badge {
            background: linear-gradient(135deg, #00cc66, #00994d);
            color: white;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 1rem;
        }
        
        .different-badge {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 1rem;
        }
        
        .normal-badge {
            background: linear-gradient(135deg, #0066cc, #0099ff);
            color: white;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 1rem;
        }
        
        /* Hidden Class */
        .hidden {
            display: none !important;
        }
        
        /* Welcome Text */
        .welcome-text {
            color: #4a5a6a;
            text-align: center;
            margin: 15px 0 25px 0;
            font-size: 1.1rem;
            line-height: 1.5;
        }
        
        /* Word box at results */
        .word-box {
            background: white;
            border: 2px solid #ffcc00;
            border-radius: 32px;
            padding: 20px;
            margin: 15px 0;
            text-align: center;
        }
        
        .word-label {
            color: #0066cc;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        
        .word-value {
            color: #333;
            font-size: 2.5rem;
            font-weight: bold;
        }
        
        .word-value-different {
            color: #cc0000;
            font-size: 2.5rem;
            font-weight: bold;
        }
        
        /* Game Description Modal */
        .game-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-modal-content {
            background: white;
            border-radius: 48px;
            padding: 35px 25px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            border: 3px solid #ffcc00;
            animation: modalPop 0.3s ease;
        }
        
        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .game-modal-icon {
            font-size: 5rem;
            margin-bottom: 15px;
        }
        
        .game-modal-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .game-modal-title.blue {
            color: #0066cc;
        }
        
        .game-modal-title.red {
            color: #cc0000;
        }
        
        .game-modal-text {
            font-size: 1.3rem;
            line-height: 1.6;
            color: #333;
            margin: 20px 0;
            padding: 15px;
            background: #f5f9ff;
            border-radius: 30px;
            border: 1px solid #ffcc00;
        }
        
        .game-modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .game-modal-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Rabar', 'Arial Unicode MS', 'Segoe UI', sans-serif;
        }
        
        .game-modal-btn.confirm {
            background: linear-gradient(135deg, #00cc66, #00994d);
            color: white;
            box-shadow: 0 4px 0 #006633;
        }
        
        .game-modal-btn.confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #006633;
        }
        
        .game-modal-btn.cancel {
            background: white;
            color: #666;
            border: 2px solid #ccc;
            box-shadow: 0 4px 0 #999;
        }
        
        .game-modal-btn.cancel:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #999;
        }
        
        /* ===== GREY FOOTER ===== */
        .app-footer {
            text-align: center;
            color: #666;
            font-size: 1rem;
            direction: rtl;
        }
        
        .footer-link {
            color: #666;
            text-decoration: underline;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        
        .footer-link:hover {
            color: #0066cc;
        }
    </style>
</head>
<body>
    <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <div class="game-container">
            <div class="content" id="app">
                <!-- Page 1: Home Page - WITH 2 BUTTONS! -->
                <div id="home-page">
                    <h1>🕵️ یارییا سیخوڕی</h1>
                    
                    <p class="welcome-text">
                        یارییەک بو بوراندنا دەمێن خوش دگەل هەڤاڵان.
                    </p>
                    
                    <!-- TWO BUTTONS ONLY with popup messages -->
                    <button class="btn btn-blue" onclick="showGameDescription(1)">یارییا سیخوڕی 🎮</button>
                    <button class="btn btn-red" onclick="showGameDescription(2)">یارییا وشەیێن جیاواز 🎭</button>
                </div>
                
                <!-- Page 2: Setup Page -->
                <div id="setup-page" class="hidden">
                    <h2 id="setup-title">⚙️ ڕێکخستن</h2>
                    
                    <div class="counter-container">
                        <button class="counter-btn" onclick="changePlayerCount(-1)">−</button>
                        <span class="counter-value" id="player-count">5</span>
                        <button class="counter-btn" onclick="changePlayerCount(1)">+</button>
                    </div>
                    
                    <div id="player-inputs-container">
                        <!-- Player inputs will be added here -->
                    </div>
                    
                    <button class="btn btn-blue" onclick="startGame()">دەستپێکرن</button>
                    <button class="btn btn-red" onclick="goBackToHome()">زڤرین</button>
                </div>
                
                <!-- Page 3: Game Page (Card Reveal) -->
                <div id="game-page" class="hidden">
                    <h2 id="game-title">🎴 کارتەکان</h2>
                    <div class="progress" id="game-progress"></div>
                    
                    <div id="card-container">
                        <!-- Card will be displayed here -->
                    </div>
                    
                    <button class="btn btn-blue hidden" id="next-player-btn" onclick="nextPlayer()">یارییکەرێ دویفرا</button>
                    <button class="reveal-btn hidden" id="reveal-btn" onclick="goToRevealPage()">🔍 پیشاندانی کەسە جیاوازەکە</button>
                </div>
                
                <!-- Page 4: Reveal Page (for both games) -->
                <div id="reveal-page" class="hidden">
                    <h2 id="reveal-title">🕵️ ئاشکراکردن</h2>
                    
                    <div id="reveal-container">
                        <!-- Reveal content will be shown here -->
                    </div>
                    
                    <button class="btn btn-blue" onclick="showFinalResults()">دییتنا ئەنجام</button>
                </div>
                
                <!-- Page 5: Results Page - with fixed buttons! -->
                <div id="results-page" class="hidden">
                    <h2>ئەنجام 🏆</h2>
                    
                    <div id="results-container">
                        <!-- Results will be displayed here -->
                    </div>
                    
                    <!-- Play Again now replays same game mode! -->
                    <button class="btn btn-blue" onclick="playAgain()">دوبارە یارییکرن 🔁</button>
                    <!-- Main Page button is now YELLOW! -->
                    <button class="btn btn-yellow" onclick="goToHomePage()">زڤرین بو دەستپێک 🏠</button>
                </div>
            </div>
        </div>
        
        <!-- ===== GREY FOOTER ===== -->
        <div class="app-footer">
            <span>- هاتییە دروستکرن ژلایێ</span>
            <a href="https://kurdor.is-a.dev" target="_blank" class="footer-link">رەشید فەرهاد</a>
        </div>
    </div>
    
    <!-- Game Description Modal (hidden by default) -->
    <div id="game-description-modal" class="game-modal hidden">
        <div class="game-modal-content">
            <div id="modal-icon" class="game-modal-icon">🎮</div>
            <div id="modal-title" class="game-modal-title blue">یاری سیخوڕ</div>
            <div id="modal-text" class="game-modal-text"></div>
            <div class="game-modal-buttons">
                <button class="game-modal-btn confirm" onclick="confirmGame()">باشە</button>
                <button class="game-modal-btn cancel" onclick="closeGameDescription()">زڤرین</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== GAME STATE ====================
        const gameState = {
            players: [],
            spies: [],
            secretWord: "",
            differentWord: "", // For game mode 2
            gameMode: 1, // 1 = Imposter Game, 2 = Different Word Game
            currentPlayerIndex: 0,
            gameOver: false,
            playerNames: [] // Store player names for replay
        };
        
        // Word pairs for Game Mode 2 (Different Word)
        const wordPairs = [
            { normal: "پیتزا", different: "بەرگر" },
            { normal: "کۆکا کۆلا", different: "پێپسی" },
            { normal: "ئایفون", different: "ئەندرۆید" },
            { normal: "نایک", different: "ئەدیداس" },
            { normal: "تایۆتا", different: "‌نیسان" },
            { normal: "فەیسبووک", different: "ئیستاگرام" },
 { normal: "مێسی", different: "مەرەدونا" },
 { normal: "رونالدو نازاریو", different: "رونالدیمهو" },
            { normal: "قەهور", different: "چا" },
            { normal: "شەتەڕەنج", different: "دومینە" },
            { normal: "پاس", different: "قیتار" }
        ];
        
        // Regular words for game mode 1
        const kurdishWords = {
            خواردن: ["کەباب", "برنج", "کافی", "نارگیل", "شاورمە", "بەرخ"],
            گیانلەبەران: ["ریڤی", "چێل", "بەراز", "فەرماندە خورشید", "بزن", "سەگ"],
            پیشە: ["مامۆستا", "دختور", "مەهندس", "بازرگان", "فەلاح"],
            وڵات: ["کوردستان", "هیتلەر", "گیڤارا", "خوخ", "سێڤ"],
            ڕەنگ: ["هناروک", "ساحە", "سەیارە", "طەیارە", "مێسی", "حەمدی"]
        };
        
        const categories = Object.keys(kurdishWords);
        
        // ==================== GAME DESCRIPTION MODAL ====================
        function showGameDescription(mode) {
            gameState.gameMode = mode;
            
            const modal = document.getElementById('game-description-modal');
            const icon = document.getElementById('modal-icon');
            const title = document.getElementById('modal-title');
            const text = document.getElementById('modal-text');
            
            if (mode === 1) {
                // Imposter Game description
                icon.textContent = '🕵️';
                title.textContent = 'یارییا سیخوڕی';
                title.className = 'game-modal-title blue';
                text.textContent = 'ڤێ یاریێ سیخوڕ یێ تێدا! سیخور  دزانیت کو ئەو سیخورە.   دڤێت سیخور بهێتە کەشف کرن!';
            } else {
                // Different Word Game description
                icon.textContent = '🎭';
                title.textContent = 'وشەیێن جیاواز';
                title.className = 'game-modal-title red';
                text.textContent = 'دڤێ یارییێدا سیخوڕ نینە!   ئێک کەس دێ وشەییا جیاواز بینیت. دڤێت ئەو کەسە بهێتە کەشفکرن!';
            }
            
            modal.classList.remove('hidden');
        }
        
        function closeGameDescription() {
            document.getElementById('game-description-modal').classList.add('hidden');
        }
        
        function confirmGame() {
            closeGameDescription();
            
            if (gameState.gameMode === 1) {
                document.getElementById('setup-title').textContent = '⚙️ ڕێکخستنا یارییا سیخوڕی';
            } else {
                document.getElementById('setup-title').textContent = '⚙️ ڕێکخستنا یارییا وشێن جیاواز';
            }
            
            showPage('setup-page');
        }
        
        // ==================== UI FUNCTIONS ====================
        function showPage(pageId) {
            // Hide all pages
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('setup-page').classList.add('hidden');
            document.getElementById('game-page').classList.add('hidden');
            document.getElementById('reveal-page').classList.add('hidden');
            document.getElementById('results-page').classList.add('hidden');
            
            // Show requested page
            document.getElementById(pageId).classList.remove('hidden');
            
            // Initialize page if needed
            if (pageId === 'setup-page') {
                initializeSetupPage();
            }
            
            // Update reveal title based on game mode
            if (pageId === 'reveal-page') {
                if (gameState.gameMode === 1) {
                    document.getElementById('reveal-title').textContent = '🕵️ سیخوڕەکە';
                } else {
                    document.getElementById('reveal-title').textContent = '🎭 کەسە جیاوازەکە';
                }
            }
        }
        
        // New function to go back to home page from setup
        function goBackToHome() {
            showPage('home-page');
        }
        
        // New function to go to home page from results (yellow button)
        function goToHomePage() {
            showPage('home-page');
        }
        
        // ==================== SETUP FUNCTIONS ====================
        let currentPlayerCount = 5;
        
        function changePlayerCount(delta) {
            currentPlayerCount = Math.min(10, Math.max(3, currentPlayerCount + delta));
            document.getElementById('player-count').textContent = currentPlayerCount;
            updatePlayerInputs();
        }
        
        function updatePlayerInputs() {
            const container = document.getElementById('player-inputs-container');
            let html = '';
            
            for (let i = 1; i <= currentPlayerCount; i++) {
                html += `
                    <div style="margin: 8px 0;">
                        <input type="text" class="player-input" id="player-name-${i}" 
                               placeholder="یارییکەرێ ${i}">
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        function initializeSetupPage() {
            document.getElementById('player-count').textContent = currentPlayerCount;
            updatePlayerInputs();
        }
        
        // ==================== GAME FUNCTIONS ====================
        function startGame() {
            // Get player names and store them for replay
            const players = [];
            for (let i = 1; i <= currentPlayerCount; i++) {
                const nameInput = document.getElementById(`player-name-${i}`);
                const name = nameInput && nameInput.value.trim() !== '' ? nameInput.value : `یارییکەرێ ${i}`;
                players.push(name);
            }
            
            // Store player names for replay
            gameState.playerNames = [...players];
            
            // Start a new game with current settings
            startNewGameWithNames(players);
        }
        
        function startNewGameWithNames(players) {
            // Select words based on game mode
            let secretWord, differentWord, spyIndices = [];
            
            if (gameState.gameMode === 1) {
                // IMPOSTER GAME
                let spyCount = 1;
                if (currentPlayerCount >= 6 && currentPlayerCount <= 8) spyCount = 2;
                if (currentPlayerCount >= 9) spyCount = 3;
                
                // Randomly select spies
                while (spyIndices.length < spyCount) {
                    const randomIndex = Math.floor(Math.random() * currentPlayerCount);
                    if (!spyIndices.includes(randomIndex)) {
                        spyIndices.push(randomIndex);
                    }
                }
                
                const randomCategory = categories[Math.floor(Math.random() * categories.length)];
                const categoryWords = kurdishWords[randomCategory];
                secretWord = categoryWords[Math.floor(Math.random() * categoryWords.length)];
                differentWord = "";
                
            } else {
                // DIFFERENT WORD GAME (4 pizza, 1 burger)
                // Randomly select ONE person to get different word
                const differentIndex = Math.floor(Math.random() * currentPlayerCount);
                spyIndices = [differentIndex];
                
                // Select random word pair
                const randomPair = wordPairs[Math.floor(Math.random() * wordPairs.length)];
                secretWord = randomPair.normal;      // Most players get this
                differentWord = randomPair.different; // One player gets this
            }
            
            // Initialize game state
            gameState.players = players.map((name, index) => ({
                id: index + 1,
                name: name,
                isSpy: spyIndices.includes(index),
                hasDifferentWord: gameState.gameMode === 2 ? spyIndices.includes(index) : false
            }));
            
            gameState.spies = spyIndices.map(index => index + 1);
            gameState.secretWord = secretWord;
            gameState.differentWord = differentWord;
            gameState.currentPlayerIndex = 0;
            gameState.gameOver = false;
            
            // Go to game page
            showPage('game-page');
            showNextCard();
        }
        
        function showNextCard() {
            const container = document.getElementById('card-container');
            const progress = document.getElementById('game-progress');
            const nextBtn = document.getElementById('next-player-btn');
            const revealBtn = document.getElementById('reveal-btn');
            
            const currentPlayer = gameState.players[gameState.currentPlayerIndex];
            
            if (!currentPlayer) {
                // All players have seen their cards - show reveal button for both games
                let message = gameState.gameMode === 1 ? 
                    'کلیک ل خوارێ بکە بو دییتنا سیخوڕی' : 
                    'کلیک ل خوارێ بکە بۆ دییتنا کەسێ جیاواز';
                
                container.innerHTML = `
                    <div class="card" style="cursor: default; background: #f0f7ff;">
                        <div class="role-icon">🎯</div>
                        <div class="role-text" style="color: #0066cc;">هەمی کارت هاتتنە دیتن</div>
                        <div style="color: #666; margin-top: 15px;">${message}</div>
                    </div>
                `;
                nextBtn.classList.add('hidden');
                revealBtn.classList.remove('hidden');
                
                // Update reveal button text based on game mode
                if (gameState.gameMode === 1) {
                    revealBtn.textContent = 'کەشف کرنا سیخوڕی 🔎';
                } else {
                    revealBtn.textContent = 'کەشف کرنا کەسێ جیاواز 🔎';
                }
                
                progress.textContent = `${gameState.players.length}/${gameState.players.length} - تەمام`;
                return;
            }
            
            progress.textContent = `یارییکەرێ ${gameState.currentPlayerIndex + 1} ل ${gameState.players.length}`;
            
            // All cards start white before reveal
            container.innerHTML = `
                <div class="card" id="role-card" onclick="revealRole(${currentPlayer.id})">
                    <div class="player-name">${currentPlayer.name}</div>
                    <div class="tap-message">دەستێ خۆ ڵی بدە بو بینینا رولێ خو</div>
                    <div style="color: #999; font-size: 0.9rem; margin-top: 15px;">(بتنێ تو دێ بینی)</div>
                </div>
            `;
            
            nextBtn.classList.add('hidden');
            revealBtn.classList.add('hidden');
        }
        
        function revealRole(playerId) {
            const player = gameState.players.find(p => p.id === playerId);
            const container = document.getElementById('card-container');
            const nextBtn = document.getElementById('next-player-btn');
            
            if (!player) return;
            
            if (gameState.gameMode === 1) {
                // IMPOSTER GAME - colors after reveal
                if (player.isSpy) {
                    // SPY - RED CARD
                    container.innerHTML = `
                        <div class="card-spy-revealed">
                            <div class="role-icon">🕵️</div>
                            <div class="role-text" style="color: white; font-size: 2rem; margin-bottom: 15px;">تۆ سیخوڕی!</div>
                            <div style="margin-top: 15px; font-size: 1.1rem; color: white;"> تۆ وشێ نزانی</div>
                            <div style="margin-top: 20px; color: #ffcc00; font-size: 1.1rem;">هەوڵبدە وشێ بزانی!</div>
                        </div>
                    `;
                } else {
                    // CIVILIAN - GREEN CARD
                    container.innerHTML = `
                        <div class="card-civilian-revealed">
                            <div class="role-icon">👨‍🌾</div>
                            <div class="role-text" style="color: white; font-size: 2rem; margin-bottom: 15px;">تۆ مەدەنی</div>
                            <div style="margin: 15px 0; font-size: 1.1rem; color: white;">وشە:</div>
                            <div class="word-display">${gameState.secretWord}</div>
                        </div>
                    `;
                }
            } else {
                // DIFFERENT WORD GAME - all white cards after reveal
                const wordToShow = player.hasDifferentWord ? gameState.differentWord : gameState.secretWord;
                
                container.innerHTML = `
                    <div class="card-white-revealed">
                        <div class="word-display">${wordToShow}</div>
                    </div>
                `;
            }
            
            nextBtn.classList.remove('hidden');
        }
        
        function nextPlayer() {
            gameState.currentPlayerIndex++;
            
            if (gameState.currentPlayerIndex < gameState.players.length) {
                showNextCard();
            } else {
                showNextCard();
            }
        }
        
        function goToRevealPage() {
            showPage('reveal-page');
            
            const container = document.getElementById('reveal-container');
            
            if (gameState.gameMode === 1) {
                // IMPOSTER GAME - show spies
                const spies = gameState.players.filter(p => p.isSpy);
                
                if (spies.length === 1) {
                    const imposter = spies[0];
                    container.innerHTML = `
                        <div class="reveal-card">
                            <div class="role-icon">🕵️</div>
                            <div class="role-text" style="color: #ffcc00;"> سیخوڕ بریتییە ل!</div>
                            <div class="person-name">${imposter.name}</div>
                            <div style="background: #333; padding: 15px; border-radius: 30px; margin-top: 20px; border: 1px solid #ffcc00;">
                                <div style="font-size: 1.1rem; color: #ffcc00;">وشە:</div>
                                <div style="font-size: 2rem; font-weight: 500; margin-top: 5px; color: white;">${gameState.secretWord}</div>
                            </div>
                        </div>
                    `;
                } else {
                    let spiesHtml = '<div style="margin: 15px 0;">';
                    spies.forEach(spy => {
                        spiesHtml += `<div style="font-size: 1.8rem; margin: 10px 0; background: #333; padding: 12px; border-radius: 30px; border: 1px solid #ffcc00; color: #ffcc00;">${spy.name}</div>`;
                    });
                    spiesHtml += '</div>';
                    
                    container.innerHTML = `
                        <div class="reveal-card">
                            <div class="role-icon">🕵️🕵️</div>
                            <div class="role-text" style="color: #ffcc00;">سیخوڕ ئەڤەنە!</div>
                            ${spiesHtml}
                            <div style="background: #333; padding: 15px; border-radius: 30px; margin-top: 20px; border: 1px solid #ffcc00;">
                                <div style="font-size: 1.1rem; color: #ffcc00;">وشە:</div>
                                <div style="font-size: 2rem; font-weight: 500; margin-top: 5px; color: white;">${gameState.secretWord}</div>
                            </div>
                        </div>
                    `;
                }
            } else {
                // DIFFERENT WORD GAME - show the person with different word
                const differentPerson = gameState.players.find(p => p.hasDifferentWord);
                
                container.innerHTML = `
                    <div class="reveal-card">
                        <div class="role-icon">🎭</div>
                        <div class="role-text" style="color: #ffcc00;">کەسێ جیاواز ئەڤەیە!</div>
                        <div class="person-name">${differentPerson.name}</div>
                        <div style="background: #333; padding: 15px; border-radius: 30px; margin-top: 20px; border: 1px solid #ffcc00;">
                            <div style="font-size: 1.1rem; color: #ffcc00;">وشەییا ئاسایی:</div>
                            <div style="font-size: 1.8rem; font-weight: 500; color: white;">${gameState.secretWord}</div>
                            <div style="font-size: 1.1rem; color: #ffcc00; margin-top: 15px;">وشەییا جیاواز:</div>
                            <div style="font-size: 1.8rem; font-weight: 500; color: #ff6b6b;">${gameState.differentWord}</div>
                        </div>
                    </div>
                `;
            }
        }
        
        function showFinalResults() {
            showPage('results-page');
            
            const container = document.getElementById('results-container');
            
            let playersHtml = '<div class="results-container">';
            
            if (gameState.gameMode === 1) {
                // Imposter game results
                gameState.players.forEach(player => {
                    const roleText = player.isSpy ? '<span class="spy-badge">سیخوڕ</span>' : '<span class="civilian-badge">مەدەنی</span>';
                    playersHtml += `
                        <div class="player-result">
                            <span>${player.name}</span>
                            ${roleText}
                        </div>
                    `;
                });
                
                playersHtml += '</div>';
                
                // Just show the word
                container.innerHTML = `
                    ${playersHtml}
                    <div class="word-box">
                        <div class="word-value">${gameState.secretWord}</div>
                    </div>
                `;
                
            } else {
                // Different word game results
                gameState.players.forEach(player => {
                    const badge = player.hasDifferentWord ? 
                        '<span class="different-badge">جیاواز</span>' : 
                        '<span class="normal-badge">ئاسایی</span>';
                    
                    playersHtml += `
                        <div class="player-result">
                            <span>${player.name}</span>
                            ${badge}
                        </div>
                    `;
                });
                
                playersHtml += '</div>';
                
                // Show both words
                container.innerHTML = `
                    ${playersHtml}
                    <div class="word-box">
                        <div class="word-value">${gameState.secretWord}</div>
                    </div>
                    <div class="word-box">
                        <div class="word-value-different">${gameState.differentWord}</div>
                    </div>
                `;
            }
        }
        
        // Play Again now starts a new game with the SAME mode and SAME player names!
        function playAgain() {
            // Start a new game with the stored player names
            startNewGameWithNames(gameState.playerNames);
        }
        
        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', function() {
            showPage('home-page');
            
            // Close modal if clicking outside
            document.getElementById('game-description-modal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeGameDescription();
                }
            });
        });
    </script>
</body>
</html>
