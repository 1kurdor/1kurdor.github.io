<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>سیخوڕ | Sikhur</title>
    <link rel="icon" type="image/png" href="assets/image/sikhur.jpg">
    <style>
        @font-face {
            font-family: 'Rabar';
            src: url('assets/fonts/Rabar.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        
        @font-face {
            font-family: 'Rabar';
            src: url('assets/fonts/Rabar-bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
            font-display: swap;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
  
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    
        input, textarea {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }
        
        body {
            font-family: 'Rabar', 'Arial Unicode MS', 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #e6f0ff 0%, #f0f7ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            direction: rtl;
            padding: 12px;
            position: relative;
        }
        
        .game-container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 36px;
            padding: 24px 20px 20px 20px;
            box-shadow: 
                0 15px 30px rgba(0, 100, 255, 0.1),
                0 5px 15px rgba(255, 200, 0, 0.1);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 215, 0, 0.2);
            margin-bottom: 10px;
        }
        
        .game-container::before {
            content: "";
            position: absolute;
            top: -50px;
            right: -50px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.1), transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }
        
        .game-container::after {
            content: "";
            position: absolute;
            bottom: -50px;
            left: -50px;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.1), transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }
        
        .content {
            position: relative;
            z-index: 2;
        }
        
        h1 {
            font-size: 2.2rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.5px;
        }
        
        h2 {
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 18px;
            color: #0066cc;
            position: relative;
            padding-bottom: 8px;
            font-weight: 500;
        }
        
        h2::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 2px;
            background: linear-gradient(90deg, #0066cc, #ffcc00);
            border-radius: 2px;
        }
        
        .animated-icon {
            text-align: center;
            margin: 10px 0 20px 0;
        }

        .animated-icon img {
            width: 300px;
            height: auto;
            display: inline-block;
        }
        
        .game-icon {
            width: 130px;
            height: auto;
            animation: gentlePulse 2.5s infinite ease-in-out;
            filter: drop-shadow(0 8px 15px rgba(0,102,204,0.4));
            border-radius: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .game-icon:hover {
            animation: none;
            transform: scale(1.05);
            filter: drop-shadow(0 0 20px #ffcc00);
        }
        
        @keyframes gentlePulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }
        }
        
        .how-to-play-link {
            text-align: center;
            margin: 5px 0 15px 0;
            font-size: 1rem;
            color: #666;
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.2s ease;
        }
        
        .how-to-play-link:hover {
            color: #0066cc;
        }
        
        .btn {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin: 10px 0;
            font-family: 'Rabar', 'Arial Unicode MS', 'Segoe UI', sans-serif;
            box-shadow: 0 4px 10px rgba(0, 102, 204, 0.1);
        }
        
        .btn-blue {
            background: linear-gradient(135deg, #0066cc, #0099ff);
            color: white;
            box-shadow: 0 4px 0 #003366;
        }
        
        .btn-blue:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #003366;
        }
        
        .btn-red {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
            box-shadow: 0 4px 0 #990000;
        }
        
        .btn-red:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #990000;
        }
        
        .btn-yellow {
            background: linear-gradient(135deg, #ffcc00, #ffaa00);
            color: #1a2a3a;
            box-shadow: 0 4px 0 #996600;
        }
        
        .btn-yellow:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #996600;
        }
        
        .btn-secondary {
            background: white;
            color: #0066cc;
            border: 1px solid #ffcc00;
        }
        
        .counter-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            background: white;
            padding: 12px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0, 102, 204, 0.05);
            border: 1px solid rgba(255, 204, 0, 0.2);
        }
        
        .counter-btn {
            width: 45px;
            height: 45px;
            border-radius: 25px;
            background: linear-gradient(135deg, #0066cc, #0099ff);
            border: none;
            font-size: 1.8rem;
            font-weight: 500;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 102, 204, 0.2);
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .counter-btn:active {
            transform: scale(0.95);
        }
        
        .counter-value {
            font-size: 2.5rem;
            font-weight: 500;
            color: #0066cc;
            min-width: 60px;
            text-align: center;
        }
        
        .player-input {
            width: 100%;
            padding: 14px 18px;
            margin: 8px 0;
            border: 1px solid rgba(0, 102, 204, 0.2);
            border-radius: 40px;
            background: white;
            font-size: 1rem;
            text-align: right;
            direction: rtl;
            font-family: 'Rabar', 'Arial Unicode MS', 'Segoe UI', sans-serif;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
        }
        
        .player-input:focus {
            outline: none;
            border-color: #ffcc00;
            box-shadow: 0 0 0 3px rgba(255, 204, 0, 0.1);
        }
        
        .player-input::placeholder {
            color: #99b8d9;
            font-size: 0.95rem;
        }
        
        .card {
            background: white;
            border-radius: 32px;
            padding: 40px 20px;
            margin: 18px 0;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: gentleFade 0.4s ease;
            border: 2px solid #0066cc;
            box-shadow: 0 15px 30px rgba(0, 102, 204, 0.1);
        }
        
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0, 102, 204, 0.2);
        }
        
        .card:active {
            transform: scale(0.98);
        }
        
        @keyframes gentleFade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .player-name {
            font-size: 2rem;
            color: #0066cc;
            margin-bottom: 20px;
            font-weight: 500;
        }
        
        .tap-message {
            font-size: 1.1rem;
            color: #666;
            margin: 25px 0;
            background: #f5f9ff;
            padding: 12px 20px;
            border-radius: 40px;
            display: inline-block;
            border: 1px solid rgba(255, 204, 0, 0.2);
        }
        
        .role-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            animation: gentleBounce 0.4s ease;
        }
        
        @keyframes gentleBounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* 🔴 LOW OPACITY RED FOR SPY - 25% opacity */
        .card-spy-revealed {
            background: linear-gradient(145deg, rgba(255, 68, 68, 0.25), rgba(204, 0, 0, 0.25));
            color: white;
            border: 2px solid #ffcc00;
            box-shadow: 0 15px 30px rgba(255, 0, 0, 0.15);
            cursor: default;
            padding: 40px 20px;
            border-radius: 32px;
            text-align: center;
            backdrop-filter: blur(2px);
        }
        
        /* 🟢 LOW OPACITY GREEN FOR CIVILIAN - 25% opacity */
        .card-civilian-revealed {
            background: linear-gradient(145deg, rgba(0, 204, 102, 0.25), rgba(0, 153, 77, 0.25));
            color: white;
            border: 2px solid #ffcc00;
            box-shadow: 0 15px 30px rgba(0, 204, 0, 0.15);
            cursor: default;
            padding: 40px 20px;
            border-radius: 32px;
            text-align: center;
            backdrop-filter: blur(2px);
        }
        
        .card-spy-revealed .player-name,
        .card-civilian-revealed .player-name {
            color: white;
        }
        
        .card-spy-revealed .tap-message,
        .card-civilian-revealed .tap-message {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        .word-display {
            font-size: 3rem;
            font-weight: bold;
            padding: 20px 30px;
            border-radius: 40px;
            display: inline-block;
            margin: 15px 0;
        }
        
        .card-spy-revealed .word-display,
        .card-civilian-revealed .word-display {
            background: rgba(0, 0, 0, 0.2);
            color: #2E6F40;
        }
        
        .card-white-revealed {
            background: white;
            color: #333;
            border: 2px solid #0066cc;
            box-shadow: 0 15px 30px rgba(0, 102, 204, 0.1);
            cursor: default;
            padding: 40px 20px;
            border-radius: 32px;
            text-align: center;
        }
        
        .card-white-revealed .word-display {
            background: #f0f7ff;
            color: #00FF00;
            border: 2px solid #ffcc00;
        }
        
        .progress {
            background: white;
            padding: 12px;
            border-radius: 40px;
            text-align: center;
            margin: 18px 0;
            font-size: 1rem;
            color: #0066cc;
            font-weight: 500;
            border: 1px solid rgba(255, 204, 0, 0.2);
            box-shadow: 0 2px 5px rgba(0, 102, 204, 0.05);
        }
        
        .starter-box {
            background: linear-gradient(135deg, #0066cc, #0099ff);
            color: white;
            padding: 25px;
            border-radius: 40px;
            margin: 20px 0;
            text-align: center;
            border: 3px solid #ffcc00;
            box-shadow: 0 10px 20px rgba(0, 102, 204, 0.3);
            animation: gentlePulse 1s ease;
        }
        
        @keyframes gentlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        .starter-name {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 10px 0;
            color: #ffcc00;
        }
        
        .starter-message {
            font-size: 1.3rem;
            margin-bottom: 10px;
        }
        
        .reveal-btn {
            background: linear-gradient(135deg, #ffcc00, #ffaa00);
            color: #1a2a3a;
            font-size: 1.3rem;
            padding: 18px;
            border-radius: 40px;
            border: none;
            width: 100%;
            margin: 20px 0;
            cursor: pointer;
            box-shadow: 0 4px 0 #996600;
            transition: all 0.3s ease;
            font-family: 'Rabar', 'Arial Unicode MS', 'Segoe UI', sans-serif;
            font-weight: bold;
        }
        
        .reveal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #996600;
        }
        
        .reveal-card {
            background: linear-gradient(145deg, #1a1a1a, #333333);
            border: 3px solid #ffcc00;
            border-radius: 32px;
            padding: 30px 20px;
            text-align: center;
            animation: gentleReveal 0.5s ease;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            margin: 20px 0;
        }
        
        @keyframes gentleReveal {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .reveal-card .role-icon {
            font-size: 5rem;
        }
        
        .person-name {
            font-size: 2.2rem;
            margin: 15px 0;
            font-weight: 500;
            color: #ffcc00;
        }
        
        .results-container {
            background: #f8fbff;
            border-radius: 32px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid rgba(255, 204, 0, 0.2);
        }
        
        .player-result {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            margin: 6px 0;
            background: white;
            border-radius: 30px;
            font-size: 1.1rem;
            border: 1px solid rgba(0, 102, 204, 0.1);
        }
        
        .spy-badge {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 1rem;
        }
        
        .civilian-badge {
            background: linear-gradient(135deg, #00cc66, #00994d);
            color: white;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 1rem;
        }
        
        .different-badge {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 1rem;
        }
        
        .normal-badge {
            background: linear-gradient(135deg, #0066cc, #0099ff);
            color: white;
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 1rem;
        }
        
        .hidden {
            display: none !important;
        }
        
        .welcome-text {
            color: #4a5a6a;
            text-align: center;
            margin: 15px 0 25px 0;
            font-size: 1.1rem;
            line-height: 1.5;
        }
        
        .word-box {
            background: white;
            border: 2px solid #ffcc00;
            border-radius: 32px;
            padding: 20px;
            margin: 15px 0;
            text-align: center;
        }
        
        .word-label {
            color: #0066cc;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        
        .word-value {
            color: #333;
            font-size: 2.5rem;
            font-weight: bold;
        }
        
        .word-value-different {
            color: #cc0000;
            font-size: 2.5rem;
            font-weight: bold;
        }
        
        .game-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .game-modal-content {
            background: white;
            border-radius: 48px;
            padding: 35px 25px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            border: 3px solid #ffcc00;
            animation: modalPop 0.3s ease;
        }
        
        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .game-modal-icon {
            font-size: 5rem;
            margin-bottom: 15px;
        }
        
        .game-modal-title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .game-modal-title.blue {
            color: #0066cc;
        }
        
        .game-modal-title.red {
            color: #cc0000;
        }
        
        .game-modal-text {
            font-size: 1.3rem;
            line-height: 1.6;
            color: #333;
            margin: 20px 0;
            padding: 15px;
            background: #f5f9ff;
            border-radius: 30px;
            border: 1px solid #ffcc00;
            text-align: right;
        }
        
        .game-modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .game-modal-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Rabar', 'Arial Unicode MS', 'Segoe UI', sans-serif;
        }
        
        .game-modal-btn.confirm {
            background: linear-gradient(135deg, #00cc66, #00994d);
            color: white;
            box-shadow: 0 4px 0 #006633;
        }
        
        .game-modal-btn.confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #006633;
        }
        
        .game-modal-btn.cancel {
            background: white;
            color: #666;
            border: 2px solid #ccc;
            box-shadow: 0 4px 0 #999;
        }
        
        .game-modal-btn.cancel:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #999;
        }
        
        .how-to-play-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 10001;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .how-to-play-content {
            background: white;
            border-radius: 48px;
            padding: 30px 25px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            border: 3px solid #ffcc00;
            animation: modalPop 0.3s ease;
        }
        
        .how-to-play-option {
            width: 100%;
            padding: 20px;
            margin: 10px 0;
            border: none;
            border-radius: 40px;
            font-size: 1.3rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Rabar', 'Arial Unicode MS', 'Segoe UI', sans-serif;
        }
        
        .how-to-play-option.blue {
            background: linear-gradient(135deg, #0066cc, #0099ff);
            color: white;
            box-shadow: 0 4px 0 #003366;
        }
        
        .how-to-play-option.red {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: white;
            box-shadow: 0 4px 0 #990000;
        }
        
        .how-to-play-option:hover {
            transform: translateY(-2px);
        }
        
        .how-to-play-close {
            margin-top: 15px;
            padding: 12px;
            background: #f0f0f0;
            border: none;
            border-radius: 40px;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            font-family: 'Rabar', 'Arial Unicode MS', 'Segoe UI', sans-serif;
        }
        
        .welcome-notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #0066cc, #0099ff);
            color: white;
            padding: 16px 24px;
            border-radius: 60px;
            box-shadow: 0 10px 25px rgba(0,102,204,0.4), 0 0 0 3px #ffcc00;
            z-index: 20000;
            font-size: 1.2rem;
            text-align: center;
            direction: rtl;
            max-width: 90%;
            width: auto;
            white-space: nowrap;
            border: 2px solid white;
            animation: slideDown 0.5s ease, fadeOut 0.5s ease 4.5s forwards;
            pointer-events: auto;
    cursor: pointer;
        }
        
        @keyframes slideDown {
            from {
                top: -100px;
                opacity: 0;
            }
            to {
                top: 20px;
                opacity: 1;
            }
        }
        
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
                visibility: hidden;
            }
        }
    </style>
</head>
<body>
    <a href="https://kurdor.is-a.dev" target="_blank" rel="noopener noreferrer" 
   style="text-decoration: none; color: inherit;">
    <div id="welcomeToast" class="welcome-notification">
        هاتییە دروستکرن ژ لایێ رەشید فەرهاد
    </div>
</a>

    <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <div class="game-container">
            <div class="content" id="app">
                <div id="home-page">
                    
                    <div class="animated-icon">
                        <img src="assets/image/sikhur.jpg" alt="سیخوڕ" class="game-icon" onclick="alert('Developed By Rashid Farhad')">
                    </div>
                    
                    <p class="welcome-text">
                        یارییەک بو بوراندنا دەمێن خوش دگەل هەڤاڵان.
                    </p>
                    
                    <div class="how-to-play-link" onclick="showHowToPlayOptions()">
                        چەوا دێ یاریی کەی؟ 📖
                    </div>
                    
                    <button class="btn btn-blue" onclick="showGameDescription(1)">یارییا سیخوڕی 🎮</button>
                    <button class="btn btn-red" onclick="showGameDescription(2)">یارییا پەییڤێن جیاواز 🎭</button>
                </div>
                
                <div id="setup-page" class="hidden">

        const gameState = {

            spies: [],

        const wordPairs = [

            { normal: "خێ", different: "شەکر" },

            { normal: "قوتابخانە", different: "زانکۆ" },

        ];
        
        const kurdishWords = [
            "فەرماندە خورشید",
            "گیڤارا",
            "هیتلەر",
            "حەمدی",
            "دلو بێداری",

            "شێر",

            "پلنگ",
            "سێڤ",
            "لیموک",
            "ChatGPT",
            "مجەفە (فیر)",
            "شە 🪮",
            "چەقماق (ماکینە)",
            "جگارە",
            "نارگیل",
            "فەحم",
            "ئاڤ",
            "چیا",
            "طەیر",
            "چیچک",
            "بلە خەمبار",
            "کابینە",
            "کامیرە",
            "قودیک",
            "مەشروب",
            "هێلک",
            "شێلادزێ",
            "دوبەی",
            "کافی",
            "کەباب",
            "برنج",
            "بەرخ",

            "بازرگان",
            "فەلاح"
        ];
        
        function showHowToPlayOptions() {
            document.getElementById('how-to-play-modal').classList.remove('hidden');
        }
        
        function closeHowToPlayOptions() {
            document.getElementById('how-to-play-modal').classList.add('hidden');
        }
        
        function showHowToPlayInstructions(mode) {
            closeHowToPlayOptions();
            
            const modal = document.getElementById('how-to-play-instructions-modal');
            const icon = document.getElementById('instructions-icon');
            const title = document.getElementById('instructions-title');
            const text = document.getElementById('instructions-text');
            
            if (mode === 1) {
                icon.textContent = '';
                title.textContent = ' یارییا سیخوڕی 🕵️';
                title.style.color = '#0066cc';
                text.innerHTML = `
                    <strong>🎯 ئارمانج:</strong>  سیخوڕی بگرن!<br>
                    <strong>📋 چەوا دێ یاریێ کەی؟:</strong>
                    - سیخوڕ پەیڤێ نزانیت، لێ دێ هەولدەت ل تشتێن مەدەنیا پەیڤێ بزانیت. <br>
                    - نابیت پەیڤ بخو بهێتە گوتن لێ تشتێن ب پەیڤێ ڤە گرێدایی و نزیک درستن.<br>
                    - ب گشتی راوند (فەرە) بدلێ هنگو نە، و هەر فەرێ تە ئێک کەلیمە یاهەی نە زێدەتر!!<br>
                    - نابیت مناقشە بهێتە کرن، دناڤ راوندا (فەر)ا دا.!<br>
                    `;
            } else {
                icon.textContent = '';
                title.textContent = '  یارییا پەییڤێن جیاواز 🎭';
                title.style.color = '#cc0000';
                text.innerHTML = `
                    <strong>🎯 ئارمانج:</strong> کەسێ  جیاواز بگرن!<br>
                    <strong>📋 چەوا دێ یاریێ کەی؟:</strong>
                    - بتنێ ئێک نەفەر پەیڤا جیاواز یا هەی کو ئەوژی نزانیت ئەو یێ جیاوازە، لێ تشت هند نێزیکی ئێکن دێ یاپ زەحمەت بیتن هەتا دبینن, - نابیت مناقشە بهێتە کرن، دناڤ راوندا (فەر)ا دا.!<br>
نموونە وەک [تەیارە، عەلیکوپتەر] گەلەک 
تشتا ڤە وەکی ئێکن!<br>
- ب گشتی راوند (فەرە) بدلێ هنگو نە، و هەر فەرێ تە ئێک کەلیمە یاهەی نە زێدەتر!!
<br>
                `;
            }
            
            modal.classList.remove('hidden');
        }
        
        function closeHowToPlayInstructions() {
            document.getElementById('how-to-play-instructions-modal').classList.add('hidden');
        }
        
        function showGameDescription(mode) {
            gameState.gameMode = mode;
            
            const modal = document.getElementById('game-description-modal');
            const icon = document.getElementById('modal-icon');
            const title = document.getElementById('modal-title');
            const text = document.getElementById('modal-text');
            
            if (mode === 1) {
                icon.textContent = '🕵️';
                title.textContent = 'یارییا سیخوڕی';
                title.className = 'game-modal-title blue';
                text.textContent = 'ڤێ یاریێ سیخوڕ یێ تێدا! سیخور دزانیت کو ئەو سیخورە. دڤێت سیخور بهێتە کەشف کرن!';
            } else {
                icon.textContent = '🎭';
                title.textContent = 'پەیڤێن جیاواز';
                title.className = 'game-modal-title red';
                text.textContent = 'دڤێ یارییێدا سیخوڕ نینە! ئێک کەس دێ پەییڤا جیاواز بینیت. دڤێت ئەو کەسە بهێتە کەشفکرن!';
            }
            
            modal.classList.remove('hidden');
        }
        
        function closeGameDescription() {
            document.getElementById('game-description-modal').classList.add('hidden');
        }
        
        function confirmGame() {
            closeGameDescription();
            
            if (gameState.gameMode === 1) {
                document.getElementById('setup-title').textContent = '⚙️ ڕێکخستنا یارییا سیخوڕی';
            } else {
                document.getElementById('setup-title').textContent = '⚙️ ڕێکخستنا یارییا پەیڤێن جیاواز';
            }
            
            showPage('setup-page');
        }
        
        function showPage(pageId) {
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('setup-page').classList.add('hidden');
            document.getElementById('game-page').classList.add('hidden');
            document.getElementById('reveal-page').classList.add('hidden');
            document.getElementById('results-page').classList.add('hidden');
            
            document.getElementById(pageId).classList.remove('hidden');
            
            if (pageId === 'setup-page') {
                initializeSetupPage();
            }
            
            if (pageId === 'reveal-page') {
                if (gameState.gameMode === 1) {
                    document.getElementById('reveal-title').textContent = '🕵️ سیخوڕ';
                } else {
                    document.getElementById('reveal-title').textContent = '🎭 کەسێ جیاواز';
                }
            }
        }
        
        function goBackToHome() {
            showPage('home-page');
        }
        
        function goToHomePage() {
            showPage('home-page');
        }
        
        let currentPlayerCount = 5;
        
        function changePlayerCount(delta) {
            currentPlayerCount = Math.min(10, Math.max(3, currentPlayerCount + delta));
            document.getElementById('player-count').textContent = currentPlayerCount;
            updatePlayerInputs();
        }
        
        function updatePlayerInputs() {
            const container = document.getElementById('player-inputs-container');
            let html = '';
            
            for (let i = 1; i <= currentPlayerCount; i++) {
                html += `
                    <div style="margin: 8px 0;">
                        <input type="text" class="player-input" id="player-name-${i}" 
                               placeholder="یارییکەرێ ${i}">
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        function initializeSetupPage() {
            document.getElementById('player-count').textContent = currentPlayerCount;
            updatePlayerInputs();
        }
        
        function startGame() {
            const players = [];
            for (let i = 1; i <= currentPlayerCount; i++) {
                const nameInput = document.getElementById(`player-name-${i}`);
                const name = nameInput && nameInput.value.trim() !== '' ? nameInput.value : `یارییکەرێ ${i}`;
                players.push(name);
            }
            
            gameState.playerNames = [...players];
            
            startNewGameWithNames(players);
        }
        
        function startNewGameWithNames(players) {
            let secretWord, differentWord, spyIndices = [];
            
            if (gameState.gameMode === 1) {
                let spyCount = 1;
                if (currentPlayerCount >= 6 && currentPlayerCount <= 8) spyCount = 2;
                if (currentPlayerCount >= 9) spyCount = 3;
                
                while (spyIndices.length < spyCount) {
                    const randomIndex = Math.floor(Math.random() * currentPlayerCount);
                    if (!spyIndices.includes(randomIndex)) {
                        spyIndices.push(randomIndex);
                    }
                }
                
                secretWord = kurdishWords[Math.floor(Math.random() * kurdishWords.length)];
                differentWord = "";
                
            } else {
                const differentIndex = Math.floor(Math.random() * currentPlayerCount);
                spyIndices = [differentIndex];
                
                const randomPair = wordPairs[Math.floor(Math.random() * wordPairs.length)];
                secretWord = randomPair.normal;
                differentWord = randomPair.different;
            }
            
            gameState.players = players.map((name, index) => ({
                id: index + 1,
                name: name,
                isSpy: spyIndices.includes(index),
                hasDifferentWord: gameState.gameMode === 2 ? spyIndices.includes(index) : false
            }));
            
            gameState.spies = spyIndices.map(index => index + 1);
            gameState.secretWord = secretWord;
            gameState.differentWord = differentWord;
            gameState.currentPlayerIndex = 0;
            gameState.gameOver = false;
            gameState.starterPlayer = null;
            
            showPage('game-page');
            showNextCard();
        }
        
        function selectStarterPlayer() {
            const allPlayers = gameState.players;
            
            if (allPlayers.length > 0) {
                const randomIndex = Math.floor(Math.random() * allPlayers.length);
                gameState.starterPlayer = allPlayers[randomIndex];
            } else {
                gameState.starterPlayer = { name: "یاریکەر" };
            }
            
            return gameState.starterPlayer;
        }
        
        function showNextCard() {
            const container = document.getElementById('card-container');
            const progress = document.getElementById('game-progress');
            const nextBtn = document.getElementById('next-player-btn');
            const revealBtn = document.getElementById('reveal-btn');
            const starterContainer = document.getElementById('starter-container');
            
            const currentPlayer = gameState.players[gameState.currentPlayerIndex];
            
            if (!currentPlayer) {
                const starter = selectStarterPlayer();
                
                starterContainer.innerHTML = `
                    <div class="starter-box">
                        <div class="starter-message">🎤 دەستپێ بکە!</div>
                        <div class="starter-name">${starter.name}</div>
                        <div class="starter-note">🧠   مێشکێ خۆ بکاربیینە، هزر بکە پاشی باخڤە!  </div>
                    </div>
                `;
                starterContainer.classList.remove('hidden');
                
                container.innerHTML = `
                    <div class="card" style="cursor: default; background: #f0f7ff;">
                        <div class="role-icon">🎯</div>
                        <div class="role-text" style="color: #0066cc;">هەمی کارت هاتتنە دیتن</div>
                        <div style="color: #666; margin-top: 15px;"> پشتی فەرێت هەوە خلاس دبن، هین دشێن مناقشێ بکەن  ! 🗣️ </div>
                    </div>
                `;
                nextBtn.classList.add('hidden');
                revealBtn.classList.remove('hidden');
                
                if (gameState.gameMode === 1) {
                    revealBtn.textContent = 'کەشف کرنا سیخوڕی 🔎';
                } else {
                    revealBtn.textContent = 'کەشف کرنا کەسێ جیاواز 🔎';
                }
                
                progress.textContent = `${gameState.players.length}/${gameState.players.length} - تەمام`;
                return;
            }
            
            starterContainer.classList.add('hidden');
            
            progress.textContent = `یارییکەرێ ${gameState.currentPlayerIndex + 1} / ${gameState.players.length}`;
            
            container.innerHTML = `
                <div class="card" id="role-card" onclick="revealRole(${currentPlayer.id})">
                    <div class="player-name">${currentPlayer.name}</div>
                    <div class="tap-message">دەستێ خۆ ڵی بدە بو بینینا رولێ خو</div>
                    <div style="color: #999; font-size: 0.9rem; margin-top: 15px;">(بتنێ تو دێ بینی)</div>
                </div>
            `;
            
            nextBtn.classList.add('hidden');
            revealBtn.classList.add('hidden');
        }
        
        function revealRole(playerId) {
            const player = gameState.players.find(p => p.id === playerId);
            const container = document.getElementById('card-container');
            const nextBtn = document.getElementById('next-player-btn');
            
            if (!player) return;
            
            if (gameState.gameMode === 1) {
                if (player.isSpy) {
                    container.innerHTML = `
                        <div class="card-spy-revealed">
                            <div class="role-icon">🕵️</div>
                            <div class="role-text" style="color: #FF0000; font-size: 2rem; margin-bottom: 15px;">تۆ سیخوڕی!</div>
                            <div style="margin-top: 15px; font-size: 1.1rem; color: #000000;">تۆ پەیڤێ نزانی، هەوڵبدە پەییڤێ بزانی</div>
                            <div style="margin-top: 20px; color: #000000; font-size: 1.1rem;">خۆ دگەل مەدەنییا بگونجینە!</div>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="card-civilian-revealed">
                            <div class="role-icon">👨‍🌾</div>
                            <div class="role-text" style="color:  #000000; font-size: 2rem; margin-bottom: 15px;">تۆ مەدەنی</div>
<div style="margin-top: 15px; font-size: 1.1rem; color: #000000;"> هەوڵبدە سیخوڕی بگری! </div>
                            <div class="word-display">${gameState.secretWord}</div>
                        </div>
                    `;
                }
            } else {
                const wordToShow = player.hasDifferentWord ? gameState.differentWord : gameState.secretWord;
                
                container.innerHTML = `
                    <div class="card-white-revealed">
                        <div class="word-display">${wordToShow}</div>
                    </div>
                `;
            }
            
            nextBtn.classList.remove('hidden');
        }
        
        function nextPlayer() {
            gameState.currentPlayerIndex++;
            
            if (gameState.currentPlayerIndex < gameState.players.length) {
                showNextCard();
            } else {
                showNextCard();
            }
        }
        
        function goToRevealPage() {
            showPage('reveal-page');
            
            const container = document.getElementById('reveal-container');
            
            if (gameState.gameMode === 1) {
                const spies = gameState.players.filter(p => p.isSpy);
                
                if (spies.length === 1) {
                    const imposter = spies[0];
                    container.innerHTML = `
                        <div class="reveal-card">
                            <div class="role-icon">🕵️</div>
                            <div class="role-text" style="color: #ffcc00;">سیخوڕ =</div>
                            <div class="person-name">${imposter.name}</div>
                            <div style="background: #333; padding: 15px; border-radius: 30px; margin-top: 20px; border: 1px solid #ffcc00;">
                                <div style="font-size: 1.1rem; color: #ffcc00;">پەییڤا مەدەنییا =</div>
                                <div style="font-size: 2rem; font-weight: 500; margin-top: 5px; color: white;">${gameState.secretWord}</div>
                            </div>
                        </div>
                    `;
                } else {
                    let spiesHtml = '<div style="margin: 15px 0;">';
                    spies.forEach(spy => {
                        spiesHtml += `<div style="font-size: 1.8rem; margin: 10px 0; background: #333; padding: 12px; border-radius: 30px; border: 1px solid #ffcc00; color: #ffcc00;">${spy.name}</div>`;
                    });
                    spiesHtml += '</div>';
                    
                    container.innerHTML = `
                        <div class="reveal-card">
                            <div class="role-icon">🕵️🕵️</div>
                            <div class="role-text" style="color: #ffcc00;">سیخوڕ ئەڤەنە!</div>
                            ${spiesHtml}
                            <div style="background: #333; padding: 15px; border-radius: 30px; margin-top: 20px; border: 1px solid #ffcc00;">
                                <div style="font-size: 1.1rem; color: #ffcc00;">پەیڤاتە:</div>
                                <div style="font-size: 2rem; font-weight: 500; margin-top: 5px; color: white;">${gameState.secretWord}</div>
                            </div>
                        </div>
                    `;
                }
            } else {
                const differentPerson = gameState.players.find(p => p.hasDifferentWord);
                
                container.innerHTML = `
                    <div class="reveal-card">
                        <div class="role-icon">🎭</div>
                        <div class="role-text" style="color: #ffcc00;">کەسێ جیاواز ئەڤەیە!</div>
                        <div class="person-name">${differentPerson.name}</div>
                        <div style="background: #333; padding: 15px; border-radius: 30px; margin-top: 20px; border: 1px solid #ffcc00;">
                            <div style="font-size: 1.1rem; color: #ffcc00;">پەییڤا ئاسایی:</div>
                            <div style="font-size: 1.8rem; font-weight: 500; color: white;">${gameState.secretWord}</div>
                            <div style="font-size: 1.1rem; color: #ffcc00; margin-top: 15px;">پەییڤا جیاواز:</div>
                            <div style="font-size: 1.8rem; font-weight: 500; color: #ff6b6b;">${gameState.differentWord}</div>
                        </div>
                    </div>
                `;
            }
        }
        
        function showFinalResults() {
            showPage('results-page');
            
            const container = document.getElementById('results-container');
            
            let playersHtml = '<div class="results-container">';
            
            if (gameState.gameMode === 1) {
                gameState.players.forEach(player => {
                    const roleText = player.isSpy ? '<span class="spy-badge">سیخوڕ</span>' : '<span class="civilian-badge">مەدەنی</span>';
                    playersHtml += `
                        <div class="player-result">
                            <span>${player.name}</span>
                            ${roleText}
                        </div>
                    `;
                });
                
                playersHtml += '</div>';
                
                container.innerHTML = `
                    ${playersHtml}
                    <div class="word-box">
                        <div class="word-value">${gameState.secretWord}</div>
                    </div>
                `;
                
            } else {
                gameState.players.forEach(player => {
                    const badge = player.hasDifferentWord ? 
                        '<span class="different-badge">جیاواز</span>' : 
                        '<span class="normal-badge">ئاسایی</span>';
                    
                    playersHtml += `
                        <div class="player-result">
                            <span>${player.name}</span>
                            ${badge}
                        </div>
                    `;
                });
                
                playersHtml += '</div>';
                
                container.innerHTML = `
                    ${playersHtml}
                    <div class="word-box">
                        <div class="word-value">${gameState.secretWord}</div>
                    </div>
                    <div class="word-box">
                        <div class="word-value-different">${gameState.differentWord}</div>
                    </div>
                `;
            }
        }
        
        function playAgain() {
            startNewGameWithNames(gameState.playerNames);
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            showPage('home-page');
            
            document.getElementById('game-description-modal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeGameDescription();
                }
            });
            
            document.getElementById('how-to-play-modal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeHowToPlayOptions();
                }
            });
            
            document.getElementById('how-to-play-instructions-modal').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeHowToPlayInstructions();
                }
            });
        });
    </script>
</body>
</html>
