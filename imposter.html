<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sikhur - سیخوڕ</title>
    <style>
        @font-face {
            font-family: 'Rabar';
            src: url('assets/fonts/Rabar.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Rabar', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            direction: rtl;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            padding: 30px;
        }

        .game-icon {
            font-size: 80px;
            margin-bottom: 30px;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            line-height: 1.6;
            word-spacing: 2px;
        }

        .message {
            font-size: 1.8rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .redirect-link {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            font-family: 'Rabar', Arial, sans-serif;
            font-size: 2rem;
            padding: 20px 50px;
            border-radius: 60px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: 2px solid #ffffff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            margin-top: 20px;
        }

        .redirect-link:hover {
            background-color: transparent;
            color: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }

        .auto-redirect {
            margin-top: 40px;
            font-size: 1.3rem;
            opacity: 0.7;
            border-top: 1px solid #333;
            padding-top: 30px;
        }

        .countdown {
            font-weight: bold;
            font-size: 1.5rem;
            color: #ffffff;
            margin-top: 10px;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        /* Mobile Responsive */
        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .message {
                font-size: 1.3rem;
            }
            
            .redirect-link {
                font-size: 1.5rem;
                padding: 15px 30px;
            }
            
            .game-icon {
                font-size: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-icon"></div>
        
        <h1>یاری یا هاتییە ڤەگوهاستن </h1>
        
        
        <a href="https://sikhur.vercel.app/" class="redirect-link" id="redirectLink">
‎            کلیک بکە بۆ یاریکرنێ ⬅️
        </a>
        
        <div class="auto-redirect">
            <div>چوون بو ناڤ یاریێ</div>
            <div class="countdown" id="countdown"></div>
            <div>  </div>
        </div>
    </div>

    <script>

        const NEW_WEBSITE_URL = 'https://sikhur.vercel.app/';
        
        let secondsLeft = 10;
        const countdownElement = document.getElementById('countdown');
        const redirectLink = document.getElementById('redirectLink');
        
        
        redirectLink.href = NEW_WEBSITE_URL;
        
       
        function updateCountdown() {
            const persianNumbers = ['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'];
            const persianSecond = persianNumbers[secondsLeft] || secondsLeft;
            countdownElement.textContent = persianSecond;
            
            if (secondsLeft === 0) {
                window.location.href = NEW_WEBSITE_URL;
            } else {
                secondsLeft--;
                setTimeout(updateCountdown, 1000);
            }
        }
        
   
        window.addEventListener('load', function() {
            setTimeout(updateCountdown, 1000);
        });
        
      
        redirectLink.addEventListener('mouseenter', function() {
        });
        
        redirectLink.addEventListener('mouseleave', function() {
        });
    </script>
</body>
</html>
